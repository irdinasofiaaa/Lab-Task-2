<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Simple Kanban Board</title>
	<link rel="stylesheet" href="style.css">
</head>
<body>

	<!-- HEADER TASK 1 -->

	<header id="header-app">
		<div class="header-left">
			<div class="header-title">
				<h1 class="title">Simple Kanban Board</h1>
				<span class="task-counter">
					<span id="task-count">0</span>
					<span class="counter-label">Tasks </span>
				</span>
			</div>
		</div>

		<div class="header-right">
			<div class = "filter-section">
				<label for="priority-filter" class="filter-label">Filter</label>
				<select id="priority-filter">
					<option value = "all">All Priorities</option>
					<option value = "high">🔴 High</option>
					<option value="medium">🟡 Medium</option>
          			<option value="low">🟢 Low</option>
				</select>
			</div>
		</div>
	</header>

	<!-- BOARD -->
	<main id="board">

		<!-- COLUMN TO DO-->
		<section id= "todo" class="column">
			<div class="column-header">
				<div class= "title-wrap">
					<span class="column-dot dot-todo"></span>
			        <h2 class="column-title">To Do</h2>
			        <span class="column-count" id="todo-count">0</span>
				</div>	
			</div>
			<ul class="task-list" id="todo-list"></ul>
		    <button class="add-task-btn" data-column="todo">
		    	<span class="btn-plus">+</span> Add Task
		    </button>
		</section>

		<!-- COLUMN IN PROGRESS-->
		<section id= "inprogress" class="column">
			<div class="column-header">
				<div class= "title-wrap">
					<span class="column-dot dot-inprogress"></span>
			        <h2 class="column-title">In Progress</h2>
			        <span class="column-count" id="inprogress-count">0</span>
				</div>	
			</div>
			<ul class="task-list" id="inprogress-list"></ul>
		    <button class="add-task-btn" data-column="inprogress">
		    	<span class="btn-plus">+</span> Add Task
		    </button>
		</section>

		<!-- COLUMN DONE-->
		<section id= "done" class="column">
			<div class="column-header">
				<div class= "title-wrap">
					<span class="column-dot dot-done"></span>
			        <h2 class="column-title">Done</h2>
			        <span class="column-count" id="done-count">0</span>
				</div>	
			</div>
			<ul class="task-list" id="done-list"></ul>
		    <button class="add-task-btn" data-column="done">
		    	<span class="btn-plus">+</span> Add Task
		    </button>
		</section>

	</main>
	
</body>
</html>
