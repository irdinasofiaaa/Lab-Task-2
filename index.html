<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Simple Kanban Board</title>
	<link rel="stylesheet" href="style.css">
</head>
<body>

	<!-- HEADER TASK 1 -->

	<header id="header-app">
		<div class="header-left">
			<div class="header-title">
				<h1 class="title">Simple Kanban Board</h1>
				<span class="task-counter">
					<span id="task-count">0</span>
					<span class="counter-label">Tasks </span>
				</span>
			</div>
		</div>

		<div class="header-right">
			<div class = "filter-section">
				<label for="priority-filter" class="filter-label">Filter</label>
				<select id="priority-filter">
					<option value = "all">All Priorities</option>
					<option value = "high">🔴 High</option>
					<option value="medium">🟡 Medium</option>
          			<option value="low">🟢 Low</option>
				</select>
			</div>
		</div>
	</header>

	<!-- BOARD -->
	<main id="board">

		<!-- COLUMN TO DO-->
		<section id= "todo" class="column">
			<div class="column-header">
				<div class= "title-wrap">
					<span class="column-dot dot-todo"></span>
			        <h2 class="column-title">To Do</h2>
			        <span class="column-count" id="todo-count">0</span>
				</div>	
			</div>
			<ul class="task-list" id="todo-list"></ul>
		    <button class="add-task-btn" data-column="todo">
		    	<span class="btn-plus">+</span> Add Task
		    </button>
		</section>

		<!-- COLUMN IN PROGRESS-->
		<section id= "inprogress" class="column">
			<div class="column-header">
				<div class= "title-wrap">
					<span class="column-dot dot-inprogress"></span>
			        <h2 class="column-title">In Progress</h2>
			        <span class="column-count" id="inprogress-count">0</span>
				</div>	
			</div>
			<ul class="task-list" id="inprogress-list"></ul>
		    <button class="add-task-btn" data-column="inprogress">
		    	<span class="btn-plus">+</span> Add Task
		    </button>
		</section>

		<!-- COLUMN DONE-->
		<section id= "done" class="column">
			<div class="column-header">
				<div class= "title-wrap">
					<span class="column-dot dot-done"></span>
			        <h2 class="column-title">Done</h2>
			        <span class="column-count" id="done-count">0</span>
				</div>	
				<button class="clear-done-btn" id="clear-done-btn">Clear All</button>
			</div>
			<ul class="task-list" id="done-list"></ul>
		    <button class="add-task-btn" data-column="done">
		    	<span class="btn-plus">+</span> Add Task
		    </button>
		</section>

	</main>
	
	<!-- MODAL -->
	<div id="modal-overlay" class="modal-overlay hidden" role="dialog" aria-modal="true" aria-labelledby="modal-heading">
    <div class="modal" id="modal">
      <div class="modal-header">
        <h2 class="modal-title" id="modal-heading">New Task</h2>
        <button class="modal-close-btn" id="modal-cancel-btn" aria-label="Close modal">✕</button>
      </div>

      <div class="modal-body">
        <div class="form-field">
          <label for="task-title-input" class="form-label">Title <span class="required">*</span></label>
          <input type="text" id="task-title-input" class="form-input" placeholder="What needs to be done?" maxlength="100" />
        </div>

        <div class="form-field">
          <label for="task-desc-input" class="form-label">Description</label>
          <textarea id="task-desc-input" class="form-textarea" placeholder="Add more details..." rows="3" maxlength="400"></textarea>
        </div>

        <div class="form-row">
          <div class="form-field">
            <label for="task-priority-input" class="form-label">Priority</label>
            <select id="task-priority-input" class="form-select">
              <option value="low" selected>🟢 Low</option>
              <option value="medium" >🟡 Medium</option>
              <option value="high">🔴 High</option>
            </select>
          </div>

          <div class="form-field">
            <label for="task-due-input" class="form-label">Due Date</label>
            <input type="date" id="task-due-input" class="form-input" />
          </div>
        </div>
      </div>

      <div class="modal-footer">
        <button class="btn-secondary" id="modal-cancel-btn-2">Cancel</button>
        <button class="btn-primary" id="modal-save-btn">Save Task</button>
      </div>
    </div>
  </div>


  <script src="taskmanager.js"></script>


</body>
</html>
